<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f6e56" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Gestion financière — Connexion</title>
</head>
<body>
  <div class="app">

    <!-- Bandeau d'accueil -->
    <div style="text-align:center; padding:48px 24px 8px;">
      <img src="icon-192.png" alt="" style="width:72px; height:72px; border-radius:18px;" />
      <h1 style="font-size:26px; margin:18px 0 6px;">Gestion financière</h1>
      <p style="color:var(--muted); margin:0; font-size:15px;">Le budget du foyer, simplement.</p>
    </div>

    <div class="carte">
      <h2 id="titre-form" style="font-size:18px; margin:0 0 4px;">Se connecter</h2>

      <label class="lbl" for="email">Email</label>
      <input id="email" class="champ" type="email" inputmode="email" placeholder="ton@email.com" autocomplete="email" />

      <label class="lbl" for="mdp">Mot de passe</label>
      <input id="mdp" class="champ" type="password" placeholder="••••••••" autocomplete="current-password" />

      <!-- Champ code 2FA, caché tant qu'il n'est pas nécessaire -->
      <div id="zone-2fa" style="display:none;">
        <label class="lbl" for="code2fa">Code de l'application d'authentification</label>
        <input id="code2fa" class="champ" type="text" inputmode="numeric" placeholder="123456" autocomplete="one-time-code" />
      </div>

      <button id="btn-principal" class="btn btn-plein">Se connecter</button>

      <div style="display:flex; align-items:center; gap:10px; margin:18px 0 4px;">
        <hr style="flex:1; border:none; border-top:1px solid var(--border);" />
        <span style="color:var(--muted); font-size:13px;">ou</span>
        <hr style="flex:1; border:none; border-top:1px solid var(--border);" />
      </div>

      <button id="btn-google" class="btn btn-google">
        <svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.6 2.6 30.1 0 24 0 14.6 0 6.4 5.4 2.5 13.2l7.9 6.1C12.2 13.2 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.5 3-2.2 5.5-4.7 7.2l7.3 5.7c4.3-4 6.8-9.9 6.8-17.4z"/><path fill="#FBBC05" d="M10.4 28.3c-.5-1.5-.8-3.1-.8-4.8s.3-3.3.8-4.8l-7.9-6.1C.9 15.9 0 19.8 0 24s.9 8.1 2.5 11.4l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.1 0 11.3-2 15-5.5l-7.3-5.7c-2 1.4-4.6 2.2-7.7 2.2-6.4 0-11.8-3.7-13.6-9.3l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
        Continuer avec Google
      </button>

      <div id="message"></div>

      <button id="bascule" class="lien">Pas encore de compte ? Créer un compte</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
  let mode = "connexion"; // ou "inscription"
  const $ = id => document.getElementById(id);

  function afficherMessage(txt, type){
    $("message").innerHTML = txt ? '<div class="message ' + type + '">' + txt + '</div>' : "";
  }

  // Si déjà connecté (et 2FA validée), on va directement dans l'app.
  (async () => {
    const { data } = await sb.auth.getSession();
    if (data.session) {
      const { data: aal } = await sb.auth.mfa.getAuthenticatorAssuranceLevel();
      if (!(aal && aal.currentLevel === "aal1" && aal.nextLevel === "aal2")) {
        window.location.href = "app.html";
      }
    }
  })();

  // Basculer entre connexion et inscription
  $("bascule").onclick = () => {
    mode = mode === "connexion" ? "inscription" : "connexion";
    const inscr = mode === "inscription";
    $("titre-form").textContent = inscr ? "Créer un compte" : "Se connecter";
    $("btn-principal").textContent = inscr ? "Créer mon compte" : "Se connecter";
    $("bascule").textContent = inscr ? "Déjà un compte ? Se connecter" : "Pas encore de compte ? Créer un compte";
    $("mdp").setAttribute("autocomplete", inscr ? "new-password" : "current-password");
    $("zone-2fa").style.display = "none";
    afficherMessage("", "");
  };

  // Bouton principal : connexion OU inscription OU validation du code 2FA
  $("btn-principal").onclick = async () => {
    const email = $("email").value.trim();
    const mdp = $("mdp").value;

    // Cas 1 : on attend le code 2FA
    if ($("zone-2fa").style.display !== "none") {
      return await verifier2FA();
    }

    if (!email || !mdp){ afficherMessage("Renseigne ton email et ton mot de passe.", "err"); return; }
    afficherMessage("Un instant…", "ok");

    if (mode === "inscription") {
      const { error } = await sb.auth.signUp({ email, password: mdp });
      if (error){ afficherMessage(error.message, "err"); return; }
      afficherMessage("Compte créé. Vérifie tes emails pour confirmer, puis connecte-toi.", "ok");
      return;
    }

    // Connexion classique
    const { error } = await sb.auth.signInWithPassword({ email, password: mdp });
    if (error){ afficherMessage(error.message, "err"); return; }

    // Ce compte a-t-il la 2FA activée ?
    const { data: aal } = await sb.auth.mfa.getAuthenticatorAssuranceLevel();
    if (aal && aal.currentLevel === "aal1" && aal.nextLevel === "aal2") {
      $("zone-2fa").style.display = "block";
      $("btn-principal").textContent = "Valider le code";
      afficherMessage("Entre le code de ton application d'authentification.", "ok");
      return;
    }
    window.location.href = "app.html";
  };

  // Vérifie le code TOTP au moment de la connexion
  async function verifier2FA(){
    const code = $("code2fa").value.trim();
    const { data: facteurs } = await sb.auth.mfa.listFactors();
    const totp = facteurs && facteurs.totp && facteurs.totp[0];
    if (!totp){ afficherMessage("Aucun facteur 2FA trouvé.", "err"); return; }
    const { data: ch, error: e1 } = await sb.auth.mfa.challenge({ factorId: totp.id });
    if (e1){ afficherMessage(e1.message, "err"); return; }
    const { error: e2 } = await sb.auth.mfa.verify({ factorId: totp.id, challengeId: ch.id, code });
    if (e2){ afficherMessage("Code incorrect, réessaie.", "err"); return; }
    window.location.href = "app.html";
  }

  // Connexion avec Google
  $("btn-google").onclick = async () => {
    const { error } = await sb.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: new URL("app.html", window.location.href).href }
    });
    if (error) afficherMessage(error.message, "err");
  };

  $("mdp").addEventListener("keydown", e => { if (e.key === "Enter") $("btn-principal").click(); });
  $("code2fa").addEventListener("keydown", e => { if (e.key === "Enter") $("btn-principal").click(); });
  </script>
</body>
</html>
